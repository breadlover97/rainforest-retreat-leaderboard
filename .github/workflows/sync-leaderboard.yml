name: Sync leaderboard

on:
  repository_dispatch:
    types: [sheet-sync]
  workflow_dispatch:
  schedule:
    - cron: "0 4,16 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate leaderboard data
        env:
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SHEETS_GID: "8052026"
        run: python scripts/sync_leaderboard.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- data/leaderboard.json; then
            echo "No leaderboard changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/leaderboard.json
          git commit -m "Update leaderboard data"
          git push
